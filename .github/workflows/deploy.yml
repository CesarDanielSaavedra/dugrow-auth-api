name: 🚀 Deploy to cPanel

on:
  push:
    branches:
      - main  # ← IMPORTANTE: usa "main" no "master"

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            echo "🔄 Navegando al directorio del proyecto..."
            cd ~/dugrow-api

            echo "📥 Descargando últimos cambios desde main..."
            git pull origin main

            echo "📦 Instalando/actualizando dependencias de Composer..."
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "🗄️ RECONSTRUYENDO base de datos (wipe + seed) — CAMBIO TEMPORAL, se revierte después..."
            php artisan migrate:fresh --seed --force

            echo "🧹 Limpiando cachés antiguos..."
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            echo "⚡ Generando cachés optimizados..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🔐 Configurando permisos correctos..."
            chmod -R 775 storage bootstrap/cache

            echo "✅ ¡Deploy completado exitosamente!"
